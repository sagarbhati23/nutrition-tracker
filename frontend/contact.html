<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacroTrack - Contact</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <header class="navbar">
        <a class="logo" href="./dashboard.html">MacroTrack</a>
        <nav class="nav-links" aria-label="Private navigation">
            <a href="./dashboard.html">Dashboard</a>
            <a href="./profile.html">Profile</a>
            <a href="./contact.html" aria-current="page">Contact</a>
            <button class="link-button" type="button" onclick="logout()">Logout</button>
        </nav>
    </header>

    <main class="auth-page">
        <section class="auth-panel">
            <p class="eyebrow">Support</p>
            <h1>Contact Us</h1>

            <form id="contactForm" class="stacked-form">
                <label for="name">Name</label>
                <input type="text" id="name" placeholder="Your name" required>

                <label for="email">Email</label>
                <input type="email" id="email" placeholder="you@example.com" required>

                <label for="message">Message</label>
                <textarea id="message" placeholder="Your message" rows="5" required></textarea>

                <button type="submit">Send Message</button>
            </form>
        </section>
    </main>

    <script src="./js/common.js"></script>
    <script src="./js/contact.js"></script>
</body>
</html>
