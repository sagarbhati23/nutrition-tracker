<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacroTrack - Sign Up</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <header class="navbar">
        <a class="logo" href="./index.html">MacroTrack</a>
        <nav class="nav-links" aria-label="Public navigation">
            <a href="./home.html">Home</a>
            <a href="./login.html">Login</a>
            <a class="nav-button" href="./signup.html" aria-current="page">Sign Up</a>
        </nav>
    </header>

    <main class="auth-page">
        <section class="auth-panel wide">
            <p class="eyebrow">Start tracking</p>
            <h1>Create Account</h1>

            <form id="signupForm" class="stacked-form two-column-form">
                <div>
                    <label for="name">Name</label>
                    <input type="text" id="name" placeholder="Your name" required>
                </div>

                <div>
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>

                <div>
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="At least 6 characters" required>
                </div>

                <div>
                    <label for="age">Age</label>
                    <input type="number" id="age" placeholder="10-100" required>
                </div>

                <div>
                    <label for="weight">Weight</label>
                    <input type="number" id="weight" placeholder="kg" required>
                </div>

                <div>
                    <label for="height">Height</label>
                    <input type="number" id="height" placeholder="cm" required>
                </div>

                <div class="full-row">
                    <label for="activity_level">Activity Level</label>
                    <select id="activity_level" required>
                        <option value="">Select activity level</option>
                        <option value="Sedentary">Sedentary (No exercise)</option>
                        <option value="Light">Light (1-2 days/week)</option>
                        <option value="Moderate">Moderate (3-5 days/week)</option>
                        <option value="Active">Active (6-7 days/week)</option>
                    </select>
                </div>

                <button class="full-row" type="submit">Sign Up</button>
            </form>

            <p class="form-link">Already have an account? <a href="./login.html">Login</a></p>
        </section>
    </main>

    <script src="./js/signup.js"></script>
</body>
</html>
