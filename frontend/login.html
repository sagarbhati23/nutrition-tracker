<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacroTrack - Login</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <header class="navbar">
        <a class="logo" href="./index.html">MacroTrack</a>
        <nav class="nav-links" aria-label="Public navigation">
            <a href="./home.html">Home</a>
            <a href="./login.html" aria-current="page">Login</a>
            <a class="nav-button" href="./signup.html">Sign Up</a>
        </nav>
    </header>

    <main class="auth-page">
        <section class="auth-panel">
            <p class="eyebrow">Welcome back</p>
            <h1>Login</h1>

            <form id="loginForm" class="stacked-form">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="you@example.com" required>

                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>

                <button type="submit">Login</button>
            </form>

            <p class="form-link">New to MacroTrack? <a href="./signup.html">Create an account</a></p>
        </section>
    </main>

    <script src="./js/login.js"></script>
</body>
</html>
